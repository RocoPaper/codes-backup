<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #16171d;
        min-height: 100vh;
        font-family: "DM Sans", sans-serif;
      }

      .cinema-app {
        padding: 2.5rem 2rem;
      }

      .cinema-header {
        display: flex;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 2.5rem;
      }

      .cinema-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 42px;
        letter-spacing: 3px;
        color: #f0ece3;
        line-height: 1;
      }

      .cinema-title span {
        color: #e8a427;
      }

      .cinema-subtitle {
        font-size: 13px;
        color: #666;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }

      .filter-btn {
        background: transparent;
        border: 1px solid #2e2f38;
        color: #888;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }

      .filter-btn:hover,
      .filter-btn.active {
        background: #e8a427;
        border-color: #e8a427;
        color: #16171d;
        font-weight: 500;
      }

      .movies-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 1.5rem;
      }

      .movie-card {
        background: #1e1f27;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #2a2b35;
        transition:
          transform 0.25s ease,
          border-color 0.25s ease;
        cursor: pointer;
        position: relative;
      }

      .movie-card:hover {
        transform: translateY(-6px);
        border-color: #e8a427;
      }

      .poster-wrap {
        position: relative;
        width: 100%;
        padding-top: 110%;
        overflow: hidden;
      }

      .poster-wrap img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s ease;
      }

      .movie-card:hover .poster-wrap img {
        transform: scale(1.05);
      }

      .rating-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(22, 23, 29, 0.85);
        backdrop-filter: blur(4px);
        color: #e8a427;
        font-size: 12px;
        font-weight: 500;
        padding: 4px 9px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 4px;
        border: 1px solid rgba(232, 164, 39, 0.3);
      }

      .star-icon {
        width: 10px;
        height: 10px;
        fill: #e8a427;
      }

      .card-body {
        padding: 14px;
      }

      .movie-title {
        font-size: 14px;
        font-weight: 500;
        color: #f0ece3;
        margin-bottom: 4px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .movie-year {
        font-size: 12px;
        color: #555;
        margin-bottom: 8px;
      }

      .genre-tag {
        display: inline-block;
        border: 1px solid #2e2f38;
        color: #aaa;
        font-size: 10px;
        letter-spacing: 0.4px;
        padding: 3px 8px;
        border-radius: 4px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .divider {
        height: 1px;
        background: #2a2b35;
        margin-bottom: 10px;
      }

      .director-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .director-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #2a2b35;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .director-icon svg {
        width: 11px;
        height: 11px;
        fill: #888;
      }

      .director-name {
        font-size: 11px;
        color: #666;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .no-results {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem;
        color: #444;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="cinema-app">
      <div class="cinema-header">
        <h1 class="cinema-title">CINE<span>VAULT</span></h1>
        <span class="cinema-subtitle">10 films</span>
      </div>
      <div class="filter-bar" id="filters"></div>
      <div class="movies-grid" id="grid"></div>
    </div>

    <script>
      const movies = [
        {
          title: "Dune: Part Two",
          year: 2024,
          genre: "Sci-Fi",
          rating: 8.5,
          director: "Denis Villeneuve",
          poster:
            "https://image.tmdb.org/t/p/w500/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg",
        },
        {
          title: "Oppenheimer",
          year: 2023,
          genre: "Drama",
          rating: 8.9,
          director: "Christopher Nolan",
          poster:
            "https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg",
        },
        {
          title: "Parasite",
          year: 2019,
          genre: "Thriller",
          rating: 8.5,
          director: "Bong Joon-ho",
          poster:
            "https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg",
        },
        {
          title: "The Batman",
          year: 2022,
          genre: "Action",
          rating: 7.8,
          director: "Matt Reeves",
          poster:
            "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg",
        },
        {
          title: "Interstellar",
          year: 2014,
          genre: "Sci-Fi",
          rating: 8.7,
          director: "Christopher Nolan",
          poster:
            "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",
        },
        {
          title: "The Godfather",
          year: 1972,
          genre: "Crime",
          rating: 9.2,
          director: "Francis Ford Coppola",
          poster:
            "https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsLegHnDmni69.jpg",
        },
        {
          title: "Blade Runner 2049",
          year: 2017,
          genre: "Sci-Fi",
          rating: 8.0,
          director: "Denis Villeneuve",
          poster:
            "https://image.tmdb.org/t/p/w500/gajva2L0rPYkEWjzgFlBXCAVmUC.jpg",
        },
        {
          title: "Whiplash",
          year: 2014,
          genre: "Drama",
          rating: 8.5,
          director: "Damien Chazelle",
          poster:
            "https://image.tmdb.org/t/p/w500/7fn624j5lj3xTme2SgiLCeuedmO.jpg",
        },
        {
          title: "Mad Max: Fury Road",
          year: 2015,
          genre: "Action",
          rating: 8.1,
          director: "George Miller",
          poster:
            "https://image.tmdb.org/t/p/w500/hA2ple9q4qnwxp3hKVNhroipsir.jpg",
        },
        {
          title: "Pulp Fiction",
          year: 1994,
          genre: "Crime",
          rating: 8.9,
          director: "Quentin Tarantino",
          poster:
            "https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg",
        },
      ];

      const genres = ["All", ...new Set(movies.map((m) => m.genre))];
      let activeGenre = "All";

      const filtersEl = document.getElementById("filters");
      const gridEl = document.getElementById("grid");

      function renderFilters() {
        filtersEl.innerHTML = genres
          .map(
            (g) =>
              `<button class="filter-btn${g === activeGenre ? " active" : ""}" data-genre="${g}">${g}</button>`,
          )
          .join("");
        filtersEl.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            activeGenre = btn.dataset.genre;
            renderFilters();
            renderGrid();
          });
        });
      }

      function renderGrid() {
        const filtered =
          activeGenre === "All"
            ? movies
            : movies.filter((m) => m.genre === activeGenre);
        if (!filtered.length) {
          gridEl.innerHTML = `<div class="no-results">No films in this category.</div>`;
          return;
        }
        gridEl.innerHTML = filtered
          .map(
            (m) => `
        <div class="movie-card">
          <div class="poster-wrap">
            <img src="${m.poster}" alt="${m.title}" loading="lazy"
                 onerror="this.style.display='none';this.parentElement.style.background='#2a2b35'" />
            <span class="rating-badge">
              <svg class="star-icon" viewBox="0 0 24 24">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
              ${m.rating.toFixed(1)}
            </span>
          </div>
          <div class="card-body">
            <p class="movie-title" title="${m.title}">${m.title}</p>
            <p class="movie-year">${m.year}</p>
            <span class="genre-tag">${m.genre}</span>
            <div class="divider"></div>
            <div class="director-row">
              <div class="director-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
              </div>
              <span class="director-name">${m.director}</span>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      renderFilters();
      renderGrid();
    </script>
  </body>
</html>
